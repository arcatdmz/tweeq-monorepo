name: Unit Test / Linting
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install modules
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Check package boundaries
        run: pnpm check:boundaries
      - name: Enforce pre-ownership publish guard
        run: pnpm check:release
      - name: Build workspace packages
        run: pnpm build
      - name: Validate generated API reference
        run: pnpm docs:check
      - name: Test Node SSR imports
        run: pnpm test:ssr
      - name: Packed example smoke test
        run: pnpm test:packed
      - name: Run package tests
        run: pnpm test
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run browser parity tests
        run: pnpm e2e
