name: Unit Test / Linting
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4.4.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install modules
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Check package boundaries
        run: pnpm check:boundaries
      - name: Enforce pre-ownership publish guard
        run: pnpm check:release
      - name: Build workspace packages
        run: pnpm build
      - name: Validate generated API reference
        run: pnpm docs:check
      - name: Test Node SSR imports
        run: pnpm test:ssr
      - name: Packed example smoke test
        run: pnpm test:packed
      - name: Run package tests
        run: pnpm test
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run browser parity tests
        run: pnpm e2e

      - name: Record non-blocking release baseline
        id: release-baseline
        continue-on-error: true
        env:
          TWEEQ_RELEASE_BASELINE_OUTPUT: ${{ runner.temp }}/release-baseline.md
        run: pnpm baseline:record

      - name: Upload non-blocking release baseline
        if: steps.release-baseline.outcome == 'success'
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: release-baseline-${{ github.sha }}
          path: ${{ runner.temp }}/release-baseline.md
          retention-days: 14
