name: Deploy React demo to GitHub Pages

on:
  workflow_dispatch:
  push:
    # The public site tracks the working React renderer while main remains an
    # exact mirror of the upstream Vue repository.
    branches: ['feat/react']

# Sets the GITHUB_TOKEN permissions to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'deploy'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build React demo
        run: yarn build:demo --base "/${{ github.event.repository.name }}/"

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
